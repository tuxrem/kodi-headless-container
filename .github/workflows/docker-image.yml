name: matthuisman/kodi-headless
run-name: ${{ github.ref_name }}

on:
  push:
    tags:
      - '[0-9]+.*'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.get_info.outputs.branch }}
      tag: ${{ steps.get_info.outputs.tag }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get info
      id: get_info

      run: |
        # Get the branch(es) that contain this tag
        git fetch --all
        branch=$(git branch -r --contains $GITHUB_SHA | grep -v HEAD | head -n1 | sed 's|origin/||' | xargs)
        echo "branch=$branch"
        echo "branch=$branch" >> $GITHUB_OUTPUT
        tag=$(git describe --tags --abbrev=0)
        echo "tag=$tag"
        echo "tag=$tag" >> $GITHUB_OUTPUT

  build_amd64:
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: hub login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: build amd64
      uses: docker/build-push-action@v6
      with:
        context: .
        pull: true
        push: true
        platforms: linux/amd64
        tags: matthuisman/kodi-headless:${{ needs.setup.outputs.branch }}-${{ needs.setup.outputs.tag }}-amd64

  build_arm64:
    needs: [setup]
    runs-on: ubuntu-24.04-arm
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: hub login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Setup buildx
      uses: docker/setup-buildx-action@v3

    - name: build arm64
      uses: docker/build-push-action@v6
      with:
        context: .
        pull: true
        push: true
        platforms: linux/arm64/v8
        tags: matthuisman/kodi-headless:${{ needs.setup.outputs.branch }}-${{ needs.setup.outputs.tag }}-arm64

  build_arm:
    needs: [setup]
    runs-on: ubuntu-24.04-arm
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: hub login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Setup buildx
      uses: docker/setup-buildx-action@v3

    - name: build armv7
      uses: docker/build-push-action@v6
      with:
        file: ./Dockerfile.arm
        context: .
        pull: true
        push: true
        platforms: linux/arm/v7
        tags: matthuisman/kodi-headless:${{ needs.setup.outputs.branch }}-${{ needs.setup.outputs.tag }}-arm

  combine:
    needs: [setup, build_amd64, build_arm64, build_arm]
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: hub login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Create and push manifest images
      uses: int128/docker-manifest-create-action@v2
      with:
        tags: |
          matthuisman/kodi-headless:${{ needs.setup.outputs.branch }}
          matthuisman/kodi-headless:${{ needs.setup.outputs.branch }}-${{ needs.setup.outputs.tag }}
        sources: |
          matthuisman/kodi-headless:${{ needs.setup.outputs.branch }}-${{ needs.setup.outputs.tag }}-amd64
          matthuisman/kodi-headless:${{ needs.setup.outputs.branch }}-${{ needs.setup.outputs.tag }}-arm64
          matthuisman/kodi-headless:${{ needs.setup.outputs.branch }}-${{ needs.setup.outputs.tag }}-arm
